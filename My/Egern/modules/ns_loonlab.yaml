name: ns_loonlab2Egern
description: 使ns_loonlab安装插件或者分流时直接跳转Egern, 最低版本{Egern v2.18.0(745)}
# author: 
open_url: https://loonlab.103516.xyz/Plugin
# homepage: 
# icon: 
# manual: 

body_rewrites:
- response_regex:
    match: ^https?:\/\/loonlab\.103516\.xyz\/Plugin
    find: loon:\/\/import\?plugin=|surge:\/\/\/install-module\?url=
    replace: egern:///modules/new?url=
- response_regex:
    match: ^https?:\/\/loonlab\.103516\.xyz\/Plugin
    find: Loon 插件仓库
    replace: Loon2Egern 插件仓库

mitm:
  hostnames:
    includes:
      - loonlab.103516.xyz
